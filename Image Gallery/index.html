<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="gallery-title">Image Gallery</h1>

        <div class="toolbar">

    <div class="toolbar-spacer"></div>

    <div class="filter-buttons">

        <button class="active" data-filter="all">All</button>

        <button data-filter="nature">Nature</button>

        <button data-filter="city">City</button>

        <button data-filter="animals">Animals</button>

    </div>

    <button id="theme-toggle" aria-label="Toggle Dark Mode">

        🌙

    </button>

</div>

        </div>

        <!-- Gallery -->
        <div class="gallery">

            <div class="gallery-item" data-category="nature">
                <img src="images/img1.jpg" alt="Nature">
            </div>

            <div class="gallery-item" data-category="city">
                <img src="images/img2.jpg" alt="City">
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="images/img3.jpg" alt="Animals">
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="images/img4.jpg" alt="Nature">
            </div>

            <div class="gallery-item" data-category="city">
                <img src="images/img5.jpg" alt="City">
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="images/img6.jpg" alt="Animals">
            </div>

             <div class="gallery-item" data-category="nature">
                <img src="images/img7.jpg" alt="Nature">
            </div>

            <div class="gallery-item" data-category="city">
                <img src="images/img8.jpg" alt="City">
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="images/img9.jpg" alt="Animals">
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="images/img10.jpg" alt="Nature">
            </div>

            <div class="gallery-item" data-category="city">
                <img src="images/img11.jpg" alt="City">
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="images/img12.jpg" alt="Animals">
            </div>

              <div class="gallery-item" data-category="nature">
                <img src="images/img13.jpg" alt="Nature">
            </div>

            <div class="gallery-item" data-category="city">
                <img src="images/img14.jpg" alt="City">
            </div>

            <div class="gallery-item" data-category="animals">
                <img src="images/img15.jpg" alt="Animals">
            </div>

        </div>

    </div>

    <!-- Lightbox -->

    <div class="lightbox">

        <span class="close" aria-label="Close Lightbox">&times;</span>

        <button class="prev" aria-label="Previous Image">
            &#10094;
        </button>

        <img
            id="lightbox-img"
            src=""
            alt="Enlarged Image">

             <p id="lightbox-caption"></p>

        <button class="next" aria-label="Next Image">
            &#10095;
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
